<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Fourmis Bougent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #111; color: white; margin: 0; padding: 10px; }
    h1 { text-align: center; font-size: 22px; margin-bottom: 10px; }
    .categories { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .categories button { flex: 1; padding: 10px; background: #1565c0; color: white; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
    #items { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    #items button { width: calc(33% - 8px); padding: 12px 4px; background: #2e2e2e; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: pre-line; }
    .cart { background: #1e1e1e; border-radius: 10px; padding: 10px; }
    #cart div { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #333; }
    #cart button { padding: 4px 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 4px; }
    #total { font-size: 20px; font-weight: bold; margin: 10px 0; }
    .action-btns { display: flex; gap: 10px; margin-top: 10px; }
    .action-btns button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
    .modal.open { display: flex; }
    .modal-content { background: #222; border-radius: 12px; padding: 20px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    .modal-content h2 { margin-top: 0; }
    .modal-content button { width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; background: #1565c0; color: white; }
    .modal-content input { width: 100%; padding: 10px; font-size: 18px; border-radius: 8px; border: none; margin-bottom: 10px; box-sizing: border-box; }
    #statsContent { margin: 10px 0; line-height: 1.8; }
    .btn-cancel { background: #c62828 !important; }
    .btn-green { background: #2e7d32 !important; }
  </style>
</head>
<body>

  <h1>Les Fourmis Bougent</h1>

  <div class="categories">
    <button onclick="setCategory('softs')">Softs</button>
    <button onclick="setCategory('apero')">Apero</button>
    <button onclick="setCategory('bieres')">Bieres</button>
    <button onclick="setCategory('vins')">Vins</button>
    <button onclick="setCategory('snacks')">Snacks</button>
  </div>

  <div id="items"></div>

  <div class="cart">
    <h3 id="total">Total: 0.00 EUR</h3>
    <div id="cart"></div>
    <div class="action-btns">
      <button onclick="pay()" style="background:#f57f17;color:white;">Encaisser</button>
      <button onclick="showStats()" style="background:#1565c0;color:white;">Stats</button>
    </div>
  </div>

  <!-- STATS -->

  <div id="statsBox" class="modal">
    <div class="modal-content">
      <h2>Statistiques</h2>
      <div id="statsContent"></div>
      <button onclick="copyStats()">Copier</button>
      <button onclick="exportStats()">Exporter</button>
      <button onclick="resetStats()" class="btn-cancel">Reset</button>
      <button onclick="closeStats()" class="btn-cancel">Fermer</button>
    </div>
  </div>

  <!-- PAIEMENT -->

  <div id="paymentBox" class="modal">
    <div class="modal-content">
      <h2>Choisir paiement</h2>
      <button onclick="choosePayment('cash')" class="btn-green">Liquide</button>
      <button onclick="choosePayment('card')" class="btn-green">Carte</button>
      <button onclick="closeModal('paymentBox')" class="btn-cancel">Annuler</button>
    </div>
  </div>

  <!-- CASH -->

  <div id="cashBox" class="modal">
    <div class="modal-content">
      <h2>Montant recu</h2>
      <p>Total: <span id="amountDue"></span> EUR</p>
      <input id="cashInput" type="number" placeholder="Montant recu">
      <button onclick="validateCash()" class="btn-green">Valider</button>
      <button onclick="closeModal('cashBox')" class="btn-cancel">Annuler</button>
    </div>
  </div>

<script>

// ===== MENU =====
var menu = {
  softs: [
    { name: "Eau plate", price: 1.5, cat: "boisson" },
    { name: "Eau petillante", price: 1.5, cat: "boisson" },
    { name: "Coca", price: 2, cat: "boisson" },
    { name: "Coca zero", price: 2, cat: "boisson" },
    { name: "Fanta", price: 2, cat: "boisson" },
    { name: "Cafe", price: 2, cat: "boisson" }
  ],
  apero: [
    { name: "Apero", price: 3.5, cat: "boisson" }
  ],
  bieres: [
    { name: "Pils", price: 2, cat: "boisson" },
    { name: "Pils NA", price: 2, cat: "boisson" },
    { name: "Blanche", price: 2.5, cat: "boisson" },
    { name: "Blanche rose", price: 2.5, cat: "boisson" },
    { name: "Kriek", price: 2.5, cat: "boisson" },
    { name: "Trolls", price: 3, cat: "boisson" },
    { name: "Leffe", price: 3, cat: "boisson" },
    { name: "Quintine", price: 4, cat: "boisson" },
    { name: "Moinette verre", price: 3.5, cat: "boisson" },
    { name: "Moinette bouteille", price: 9, cat: "boisson" },
    { name: "Saison bio verre", price: 3, cat: "boisson" },
    { name: "Saison bio bouteille", price: 8, cat: "boisson" }
  ],
  vins: [
    { name: "Rouge verre", price: 2.5, cat: "boisson" },
    { name: "Blanc verre", price: 2.5, cat: "boisson" },
    { name: "Rose verre", price: 2.5, cat: "boisson" },
    { name: "Rouge bouteille", price: 14, cat: "boisson" },
    { name: "Blanc bouteille", price: 14, cat: "boisson" },
    { name: "Rose bouteille", price: 14, cat: "boisson" }
  ],
  snacks: [
    { name: "Pain saucisse", price: 4, cat: "snack" },
    { name: "Hamburger", price: 3, cat: "snack" },
    { name: "Croque", price: 3, cat: "snack" },
    { name: "Chips", price: 1, cat: "snack" },
    { name: "Cornet de glace", price: 2, cat: "snack" },
    { name: "Pot de glace", price: 3.5, cat: "snack" }
  ]
};

// ===== ETAT =====
var currentCat = "softs";
var cart = {};
var totalDay = 0;
var totalOrders = 0;
var productStats = {};
var totalCash = 0;
var totalCard = 0;

// ===== STORAGE =====
function saveData() {
  var data = JSON.stringify({
    totalDay: totalDay,
    totalOrders: totalOrders,
    productStats: productStats,
    totalCash: totalCash,
    totalCard: totalCard
  });
  localStorage.setItem("barData", data);
}

function loadData() {
  var raw = localStorage.getItem("barData");
  if (!raw) return;
  var d = JSON.parse(raw);
  totalDay     = d.totalDay     || 0;
  totalOrders  = d.totalOrders  || 0;
  productStats = d.productStats || {};
  totalCash    = d.totalCash    || 0;
  totalCard    = d.totalCard    || 0;
}

// ===== MENU =====
function setCategory(cat) {
  currentCat = cat;
  renderMenu();
}

function renderMenu() {
  var container = document.getElementById("items");
  container.innerHTML = "";
  var items = menu[currentCat];
  for (var i = 0; i < items.length; i++) {
    (function(item) {
      var btn = document.createElement("button");
      btn.innerText = item.name + "\n" + item.price + " EUR";
      btn.onclick = function() {
        addItem(item);
        btn.style.background = "#2e7d32";
      };
      container.appendChild(btn);
    })(items[i]);
  }
}

// ===== PANIER =====
function addItem(item) {
  if (!cart[item.name]) {
    cart[item.name] = { name: item.name, price: item.price, cat: item.cat, qty: 1 };
  } else {
    cart[item.name].qty++;
  }
  renderCart();
}

function addItemByName(name) {
  var cats = Object.keys(menu);
  for (var c = 0; c < cats.length; c++) {
    for (var i = 0; i < menu[cats[c]].length; i++) {
      if (menu[cats[c]][i].name === name) {
        addItem(menu[cats[c]][i]);
        return;
      }
    }
  }
}

function removeItem(name) {
  if (!cart[name]) return;
  if (cart[name].qty > 1) {
    cart[name].qty--;
  } else {
    delete cart[name];
  }
  renderCart();
}

function renderCart() {
  var container = document.getElementById("cart");
  container.innerHTML = "";
  var total = 0;
  var keys = Object.keys(cart);
  for (var i = 0; i < keys.length; i++) {
    var item = cart[keys[i]];
    total += item.price * item.qty;
    var div = document.createElement("div");
    var name = item.name;
    div.innerHTML = "<span>" + name + " x" + item.qty + "</span><div>" +
      "<button onclick=\"addItemByName('" + name + "')\">+</button>" +
      "<button onclick=\"removeItem('" + name + "')\">-</button></div>";
    container.appendChild(div);
  }
  document.getElementById("total").innerText = "Total: " + total.toFixed(2) + " EUR";
}

function getTotal() {
  var keys = Object.keys(cart);
  var total = 0;
  for (var i = 0; i < keys.length; i++) {
    total += cart[keys[i]].price * cart[keys[i]].qty;
  }
  return total;
}

function resetButtons() {
  var btns = document.querySelectorAll("#items button");
  for (var i = 0; i < btns.length; i++) {
    btns[i].style.background = "#2e2e2e";
  }
}

// ===== PAIEMENT =====
function pay() {
  if (Object.keys(cart).length === 0) {
    alert("Panier vide !");
    return;
  }
  openModal("paymentBox");
}

function choosePayment(mode) {
  var total = getTotal();
  closeModal("paymentBox");
  if (mode === "cash") {
    document.getElementById("amountDue").innerText = total.toFixed(2);
    document.getElementById("cashInput").value = "";
    openModal("cashBox");
  } else {
    finalizeSale(total, "card");
  }
}

function validateCash() {
  var total = getTotal();
  var received = parseFloat(document.getElementById("cashInput").value);
  if (isNaN(received)) { alert("Montant invalide"); return; }
  if (received < total) { alert("Montant insuffisant"); return; }
  var change = received - total;
  alert("Rendu : " + change.toFixed(2) + " EUR");
  closeModal("cashBox");
  finalizeSale(total, "cash");
}

function finalizeSale(total, mode) {
  var keys = Object.keys(cart);
  for (var i = 0; i < keys.length; i++) {
    var item = cart[keys[i]];
    productStats[item.name] = (productStats[item.name] || 0) + item.qty;
  }
  totalDay += total;
  totalOrders++;
  if (mode === "cash") totalCash += total;
  if (mode === "card") totalCard += total;
  saveData();

  var snapshot = {};
  for (var k in cart) {
    snapshot[k] = { name: cart[k].name, price: cart[k].price, cat: cart[k].cat, qty: cart[k].qty };
  }
  printTicket(total, snapshot);

  cart = {};
  renderCart();
  resetButtons();
}

// ===== IMPRESSION =====
function printTicket(total, snapshot) {
  var items = [];
  for (var k in snapshot) { items.push(snapshot[k]); }

  var boissons = [];
  var snacks = [];
  for (var i = 0; i < items.length; i++) {
    if (items[i].cat === "boisson") { boissons.push(items[i]); }
    else { snacks.push(items[i]); }
  }

  function printBlock(title, list) {
    if (list.length === 0) return;
    var rows = "";
    for (var i = 0; i < list.length; i++) {
      rows += list[i].qty + " x " + list[i].name.toUpperCase() + "<br>";
    }
    var content =
      "<div style='padding:8px;font-family:monospace;max-width:72mm;margin:0 auto;'>" +
      "<div style='text-align:center;'><img src='logo.png' style='width:110px;margin-bottom:8px;'></div>" +
      "<div style='text-align:center;font-weight:bold;'>" + title + "</div>" +
      "<div style='text-align:center;'>COMMANDE #" + totalOrders + "</div>" +
      "<hr>" + rows + "<hr>" +
      "<b>TOTAL: " + total.toFixed(2) + " EUR</b><br><br>" +
      "<div style='text-align:center;'>MERCI !</div></div>";

    var iframe = document.createElement("iframe");
    iframe.style.cssText = "position:absolute;width:0;height:0;border:0;visibility:hidden;";
    document.body.appendChild(iframe);
    var doc = iframe.contentWindow.document;
    doc.open();
    doc.write("<html><head><style>@page{size:80mm auto;margin:0;}body{width:80mm;margin:0;font-family:monospace;font-size:13px;}img{filter:grayscale(100%) contrast(200%);}</style></head><body>" + content + "</body></html>");

}

printBlock(“BOISSONS”, boissons);
if (snacks.length > 0) {
setTimeout(function() { printBlock(“SNACKS”, snacks); }, 800);
}
}

// ===== STATS =====
function showStats() {
var html =
“<h3>Total: “ + totalDay.toFixed(2) + “ EUR</h3>” +
“<p>Commandes: “ + totalOrders + “</p>” +
“<p>Cash: “ + totalCash.toFixed(2) + “ EUR</p>” +
“<p>Carte: “ + totalCard.toFixed(2) + “ EUR</p><hr>”;

var keys = Object.keys(productStats).sort(function(a, b) {
return productStats[b] - productStats[a];
});
for (var i = 0; i < keys.length; i++) {
html += keys[i] + “ : “ + productStats[keys[i]] + “<br>”;
}
document.getElementById(“statsContent”).innerHTML = html;
openModal(“statsBox”);
}

function closeStats() { closeModal(“statsBox”); }

function resetStats() {
if (!confirm(“Remettre a zero ?”)) return;
totalDay = 0; totalOrders = 0; productStats = {};
totalCash = 0; totalCard = 0;
saveData();
alert(“Stats remises a zero !”);
showStats();
}

function copyStats() {
var text = document.getElementById(“statsContent”).innerText;
navigator.clipboard.writeText(text)
.then(function() { alert(“Copie OK !”); })
.catch(function() { alert(“Erreur copie”); });
}

function exportStats() {
var text = document.getElementById(“statsContent”).innerText;
var blob = new Blob([text], { type: “text/plain” });
var url = URL.createObjectURL(blob);
var a = document.createElement(“a”);
a.href = url; a.download = “stats_bar.txt”; a.click();
setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

// ===== MODALS =====
function openModal(id) { document.getElementById(id).classList.add(“open”); }
function closeModal(id) { document.getElementById(id).classList.remove(“open”); }

// ===== INIT =====
loadData();
renderMenu();

</script>
</body>
</html>
