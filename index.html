<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Fourmis Bougent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Arial;background:#111;color:white;margin:0;padding:10px;}
    h1{text-align:center;font-size:22px;margin-bottom:10px;}
    .categories{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
    .categories button{flex:1;padding:10px;background:#1565c0;color:white;border:none;border-radius:20px;font-size:14px;cursor:pointer;}
    #items{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
    .cart{background:#1e1e1e;border-radius:10px;padding:10px;}
    #cart div{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #333;}
    #cart button{padding:4px 10px;background:#333;color:white;border:none;border-radius:4px;cursor:pointer;margin-left:4px;}
    #total{font-size:20px;font-weight:bold;margin:10px 0;}
    .action-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
    .action-btns button{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;cursor:pointer;min-width:calc(50% - 8px);}
    #cancelBtn{display:none;width:100%;margin-top:8px;padding:12px;background:#c62828;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;justify-content:center;align-items:flex-start;padding-top:40px;box-sizing:border-box;}
    .modal.open{display:flex;}
    .modal-content{background:#222;border-radius:12px;padding:20px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto;}
    .modal-content h2{margin-top:0;}
    .modal-content button{width:100%;padding:12px;margin-bottom:8px;border:none;border-radius:8px;font-size:15px;cursor:pointer;background:#1565c0;color:white;}
    .modal-content input{width:100%;padding:10px;font-size:16px;border-radius:8px;border:none;margin-bottom:10px;box-sizing:border-box;background:#333;color:white;}
    .modal-content select{background:#333;color:white;border:none;}
    #statsContent{margin:10px 0;line-height:1.9;}
    .btn-cancel{background:#c62828 !important;}
    .btn-green{background:#2e7d32 !important;}
    .btn-orange{background:#e65100 !important;}
  </style>
</head>
<body>
  <h1>Les Fourmis Bougent</h1>
  <div class="categories">
    <button onclick="setCategory('softs')">Softs</button>
    <button onclick="setCategory('apero')">Apero</button>
    <button onclick="setCategory('bieres')">Bieres</button>
    <button onclick="setCategory('vins')">Vins</button>
    <button onclick="setCategory('snacks')">Snacks</button>
  </div>
  <div id="items"></div>
  <div class="cart">
    <h3 id="total">Total: 0.00 EUR</h3>
    <div id="cart"></div>
    <div class="action-btns">
      <button onclick="pay()" style="background:#f57f17;color:white;">Encaisser</button>
      <button onclick="showStats()" style="background:#1565c0;color:white;">Stats</button>
      <button onclick="showStockModal()" style="background:#6a1b9a;color:white;">Stock debut</button>
      <button onclick="showRestockModal()" style="background:#e65100;color:white;">Reappro</button>
    </div>
    <button id="cancelBtn" onclick="cancelLastOrder()">Annuler derniere commande (<span id="cancelTimer">60s</span>)</button>
  </div>

  <div id="statsBox" class="modal">
    <div class="modal-content">
      <h2>Statistiques</h2>
      <div id="statsContent"></div>
      <button onclick="copyStats()">Copier</button>
      <button onclick="exportStats()">Exporter</button>
      <button onclick="resetStats()" class="btn-cancel">Reset tout</button>
      <button onclick="closeStats()" class="btn-cancel">Fermer</button>
    </div>
  </div>

  <div id="paymentBox" class="modal">
    <div class="modal-content">
      <h2>Choisir paiement</h2>
      <button onclick="choosePayment('cash')" class="btn-green">Liquide</button>
      <button onclick="choosePayment('card')" class="btn-green">Carte</button>
      <button onclick="closeModal('paymentBox')" class="btn-cancel">Annuler</button>
    </div>
  </div>

  <div id="cashBox" class="modal">
    <div class="modal-content">
      <h2>Montant recu</h2>
      <p>Total: <span id="amountDue"></span> EUR</p>
      <input id="cashInput" type="number" placeholder="Montant recu">
      <button onclick="validateCash()" class="btn-green">Valider</button>
      <button onclick="closeModal('cashBox')" class="btn-cancel">Annuler</button>
    </div>
  </div>

  <div id="stockBox" class="modal">
    <div class="modal-content">
      <h2>Stock debut de journee</h2>
      <p style="color:#aaa;font-size:13px;">Entrez les quantites par produit. Choisissez x1 pour des unites ou lot pour une caisse entiere.</p>
      <div id="stockContent"></div>
      <button onclick="saveStock()" class="btn-green">Sauvegarder</button>
      <button onclick="closeModal('stockBox')" class="btn-cancel">Annuler</button>
    </div>
  </div>

  <div id="restockBox" class="modal">
    <div class="modal-content">
      <h2>Reapprovisionnement</h2>
      <p style="color:#aaa;font-size:13px;">Entrez les quantites a ajouter au stock actuel.</p>
      <div id="restockContent"></div>
      <button onclick="applyRestock()" class="btn-orange">Ajouter au stock</button>
      <button onclick="closeModal('restockBox')" class="btn-cancel">Annuler</button>
    </div>
  </div>
