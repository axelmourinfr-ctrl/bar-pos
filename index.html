<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Fourmis Bougent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 10px;
      margin: 0;
      font-size: 28px;
    }

    /* CATÉGORIES */
    .categories {
      display: flex;
      overflow-x: auto;
      padding: 10px;
      gap: 10px;
    }

    .categories button {
      background: #2a2a2a;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* PRODUITS */
    #items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    #items button {
      height: 100px;
      border-radius: 15px;
      border: none;
      background: #1e1e1e;
      color: white;
      font-size: 14px;
    }

    /* PANIER */
    .cart {
      background: #1a1a1a;
      padding: 10px;
      position: sticky;
      bottom: 0;
    }

    #cart div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    button {
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .pay {
      flex: 1;
      background: #00c853;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      color: white;
    }

    .stats {
      flex: 1;
      background: #2962ff;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      color: white;
    }

    /* STATS OVERLAY */
    #statsBox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
    }

    #statsBoxContent {
      background: white;
      color: black;
      margin: 20px;
      padding: 20px;
      height: 90%;
      overflow: auto;
      border-radius: 10px;
    }

    #statsBoxContent button {
      margin-right: 10px;
      padding: 10px;
    }

  </style>
</head>

<body>

  <h1>🍺 Les Fourmis Bougent</h1>

  <!-- CATÉGORIES -->
  <div class="categories">
    <button onclick="setCategory('softs')">Softs</button>
    <button onclick="setCategory('apero')">Apéro</button>
    <button onclick="setCategory('bieres')">Bières</button>
    <button onclick="setCategory('vins')">Vins</button>
    <button onclick="setCategory('snacks')">Snacks</button>
  </div>

  <!-- PRODUITS -->
  <div id="items"></div>

  <!-- PANIER -->
  <div class="cart">
    <h3 id="total">Total: 0€</h3>
    <div id="cart"></div>

    <div class="actions">
      <button class="pay" onclick="pay()">💰 Encaisser</button>
      <button class="stats" onclick="showStats()">📊 Stats</button>
    </div>
  </div>

  <!-- STATS -->
  <div id="statsBox">
    <div id="statsBoxContent">
      <button onclick="closeStats()">❌ Fermer</button>
      <button onclick="exportStats()">📤 Export</button>
      <button onclick="resetDay()">🔄 Reset</button>

      <h2>Statistiques</h2>
      <div id="statsContent"></div>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
