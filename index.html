<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Fourmis Bougent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🍺 Les Fourmis Bougent</h1>

  <!-- CATÉGORIES -->
  <div class="categories">
    <button onclick="setCategory('softs')">Softs</button>
    <button onclick="setCategory('apero')">Apéro</button>
    <button onclick="setCategory('bieres')">Bières</button>
    <button onclick="setCategory('vins')">Vins</button>
    <button onclick="setCategory('snacks')">Snacks</button>
  </div>

  <!-- PRODUITS -->
  <div id="items"></div>

  <!-- PANIER -->
  <div class="cart">
    <h3 id="total">Total: 0€</h3>
    <div id="cart"></div>

    <div class="actions">
      <button class="pay" onclick="pay()">💰 Encaisser</button>
      <button class="stats" onclick="showStats()">📊 Stats</button>
    </div>
  </div>

  <!-- STATS -->
  <div id="statsBox">
    <div id="statsBoxContent">
      <button onclick="closeStats()">❌ Fermer</button>
      <h2>Statistiques</h2>
      <div id="statsContent"></div>
    </div>
  </div>

  <!-- PAIEMENT -->
  <div id="paymentBox">
    <div class="popup">
      <h2>Paiement</h2>
      <button onclick="choosePayment('cash')">💵 Liquide</button>
      <button onclick="choosePayment('card')">💳 Carte</button>
    </div>
  </div>

  <!-- CASH -->
  <div id="cashBox">
    <div class="popup">
      <h2>Montant reçu</h2>
      <p>Total: <span id="amountDue"></span>€</p>
      <input id="cashInput" type="number" placeholder="Montant reçu">
      <button onclick="validateCash()">Valider</button>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
