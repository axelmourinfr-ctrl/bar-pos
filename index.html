<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bar POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🍺 BAR POS</h1>

  <!-- CATÉGORIES -->
  <div class="categories">
    <button onclick="setCategory('softs')">Softs</button>
    <button onclick="setCategory('apero')">Apéro</button>
    <button onclick="setCategory('bieres')">Bières</button>
    <button onclick="setCategory('vins')">Vins</button>
    <button onclick="setCategory('snacks')">Snacks</button>
  </div>

  <!-- PRODUITS -->
  <div id="items" class="items"></div>

  <!-- PANIER -->
  <div class="cart">
    <h2>🧾 Panier</h2>
    <div id="cart"></div>
    <h3 id="total">Total: 0€</h3>

    <button onclick="pay()" class="pay">Encaisser</button>
    <button onclick="showStats()" class="stats">Stats</button>
  </div>

  <script src="app.js"></script>

</body>
</html>
