<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Fourmis Bougent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Arial;background:#111;color:white;margin:0;padding:10px;}
    h1{text-align:center;font-size:22px;margin-bottom:10px;}
    .categories{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
    .categories button{flex:1;padding:10px;background:#1565c0;color:white;border:none;border-radius:20px;font-size:14px;cursor:pointer;}
    #items{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
    #items button{width:calc(33% - 8px);padding:12px 4px;background:#2e2e2e;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:pre-line;}
    .cart{background:#1e1e1e;border-radius:10px;padding:10px;}
    #cart div{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #333;}
    #cart button{padding:4px 10px;background:#333;color:white;border:none;border-radius:4px;cursor:pointer;margin-left:4px;}
    #total{font-size:20px;font-weight:bold;margin:10px 0;}
    .action-btns{display:flex;gap:10px;margin-top:10px;}
    .action-btns button{flex:1;padding:14px;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:center;}
    .modal.open{display:flex;}
    .modal-content{background:#222;border-radius:12px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;}
    .modal-content h2{margin-top:0;}
    .modal-content button{width:100%;padding:14px;margin-bottom:10px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#1565c0;color:white;}
    .modal-content input{width:100%;padding:10px;font-size:18px;border-radius:8px;border:none;margin-bottom:10px;box-sizing:border-box;}
    #statsContent{margin:10px 0;line-height:1.8;}
    .btn-cancel{background:#c62828 !important;}
    .btn-green{background:#2e7d32 !important;}
  </style>
</head>
<body>
  <h1>Les Fourmis Bougent</h1>
  <div class="categories">
    <button onclick="setCategory('softs')">Softs</button>
    <button onclick="setCategory('apero')">Apero</button>
    <button onclick="setCategory('bieres')">Bieres</button>
    <button onclick="setCategory('vins')">Vins</button>
    <button onclick="setCategory('snacks')">Snacks</button>
  </div>
  <div id="items"></div>
  <div class="cart">
    <h3 id="total">Total: 0.00 EUR</h3>
    <div id="cart"></div>
    <div class="action-btns">
      <button onclick="pay()" style="background:#f57f17;color:white;">Encaisser</button>
      <button onclick="showStats()" style="background:#1565c0;color:white;">Stats</button>
    </div>
  </div>
  <div id="statsBox" class="modal">
    <div class="modal-content">
      <h2>Statistiques</h2>
      <div id="statsContent"></div>
      <button onclick="copyStats()">Copier</button>
      <button onclick="exportStats()">Exporter</button>
      <button onclick="resetStats()" class="btn-cancel">Reset</button>
      <button onclick="closeStats()" class="btn-cancel">Fermer</button>
    </div>
  </div>
  <div id="paymentBox" class="modal">
    <div class="modal-content">
      <h2>Choisir paiement</h2>
      <button onclick="choosePayment('cash')" class="btn-green">Liquide</button>
      <button onclick="choosePayment('card')" class="btn-green">Carte</button>
      <button onclick="closeModal('paymentBox')" class="btn-cancel">Annuler</button>
    </div>
  </div>
  <div id="cashBox" class="modal">
    <div class="modal-content">
      <h2>Montant recu</h2>
      <p>Total: <span id="amountDue"></span> EUR</p>
      <input id="cashInput" type="number" placeholder="Montant recu">
      <button onclick="validateCash()" class="btn-green">Valider</button>
      <button onclick="closeModal('cashBox')" class="btn-cancel">Annuler</button>
    </div>
  </div>
